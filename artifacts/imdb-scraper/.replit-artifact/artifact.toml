kind = "web"
previewPath = "/"
title = "IMDb Movie Rating Scraper"
version = "1.0.0"
id = "artifacts/imdb-scraper"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23414

[services.development]
run = "pnpm --filter @workspace/imdb-scraper run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/imdb-scraper", "run", "build" ]
publicDir = "artifacts/imdb-scraper/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23414"
BASE_PATH = "/"
